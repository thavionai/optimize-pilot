name: Publish Extension

# Manual-only publish to the Visual Studio Marketplace.
#
# This does NOT run automatically — it would fail without a valid `VSCE_PAT`
# secret (an Azure DevOps Personal Access Token with the "Marketplace → Manage"
# scope). Releases are currently cut by uploading the .vsix in the Marketplace
# web UI. Once a working PAT is added as the `VSCE_PAT` repo secret, run this
# workflow manually from the Actions tab to publish the version in package.json.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run check-types
      - run: npm run lint
      - run: xvfb-run -a npm test

      - name: Publish to Visual Studio Marketplace
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
